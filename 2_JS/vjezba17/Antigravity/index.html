<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciklična Matrica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 class="glow-text">Ciklična Matrica</h1>
            <p class="subtitle">Interaktivni generator spiralne matrice</p>
        </header>

        <main>
            <div class="controls glass-panel">
                <div class="input-group">
                    <label for="rows">Broj redova:</label>
                    <input type="number" id="rows" min="1" max="20" value="5">
                </div>
                <div class="input-group">
                    <label for="cols">Broj stupaca:</label>
                    <input type="number" id="cols" min="1" max="20" value="5">
                </div>
                <button id="generateBtn" class="primary-btn">Generiraj Matricu</button>
            </div>

            <div class="matrix-wrapper glass-panel">
                <div id="matrixContainer" class="matrix-grid">
                    <!-- Matrix cells will be generated here -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
